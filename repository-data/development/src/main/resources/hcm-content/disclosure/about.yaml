        <p><strong>Date:&nbsp; 7 March 2024</strong></p>

        <p>Content designer: Andy McNicoll (SG digital publishing)</p>

        <p>Peer reviewer:&nbsp; Michael Giovannetti (Disclosure Scotland)</p>

        <p>Fact checker/SME: Lynn Gallacher, Head of Communications, Disclosure Scotland,&nbsp;lynn.gallacher@disclosurescotland.gov.scot</p>

        <p>Summary: Guide published for Disclosure Site launch, Based on a restructure and reword of content moved over from mygov.scot.</p>
      publishing:contentitemlanguage: en
      publishing:metaDescription: About Disclosure Scotland and how to use our disclosure
        check and PVG services.
      publishing:noindex: false
      publishing:organisationtags: [disclosure-scotland]
      publishing:reportingtags: []
      publishing:reviewDate: 2024-06-19T00:00:00+01:00
      publishing:seoTitle: Our work
      publishing:showFeedback: true
      publishing:summary: About Disclosure Scotland and how to use our disclosure
        check and PVG services.
      publishing:title: Our work
      /publishing:content:
        jcr:primaryType: hippostd:html
        hippostd:content: |-
          <h2>Who we are</h2>

          <p>Disclosure Scotland is a Scottish Government executive agency.</p>

          <p>We help employers make safer decisions when they're recruiting people.</p>

          <p>We also make sure unsuitable people do not work with vulnerable groups, including children.</p>

          <h2>What we do</h2>

          <p>We check and share information about people’s criminal records to help employers decide if you’re right for the role you’re applying for.</p>

          <p>Our core services are:</p>

          <ul>
           <li>processing applications for disclosure checks</li>
           <li>running the Protecting Vulnerable Groups (PVG) scheme for people who work with children or protected adults</li>
           <li>keeping a list of people barred from working with children and protected adults</li>
          </ul>

          <h2>How to use our services</h2>

          <p>You can access our services on mygov.scot.</p>

          <p>These include:</p>

          <ul>
           <li>applying for basic, standard or enhanced disclosure</li>
           <li>joining the PVG scheme</li>
           <li>managing your PVG membership</li>
           <li>making a referral to us</li>
           <li>finding out about our barring lists</li>
          </ul>

          <p><a href="https://www.mygov.scot/organisations/disclosure-scotland" target="">Use our services on mygov.scot</a>.</p>
