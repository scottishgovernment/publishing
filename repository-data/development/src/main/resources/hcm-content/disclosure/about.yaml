      publishing:summary: About Disclosure Scotland's board, leadership team and
        audit and risk committee.
      publishing:title: Board and leadership team
      /publishing:content:
        jcr:primaryType: hippostd:html
        hippostd:content: |-
          <h2>Our chief executive</h2>

          <p><img src="gerard-hart-jpg/{_document}/hippogallery:original" alt="Disclosure Scotland chief executive Gerard Hart" /></p>

          <p>Our Chief Executive is Gerard Hart.</p>

          <p>He's accountable to the Scottish Parliament for our performance.</p>

          <p>He's advised by the Disclosure Scotland board.</p>

          <h2>Our board</h2>

          <p>Our board is made up of members of our senior leadership team and non-executive directors.</p>

          <p>Gerard Hart, our Chief Executive, chairs the board.</p>

          <h3>Senior leadership team</h3>

          <p>Laura Robertson, Deputy Chief Executive</p>

          <p>Nicola McBain, Director of Corporate Services</p>

          <p>Lynne McMinn, Interim Strategic Director – Programme Delivery</p>

          <p>Kathleen McInulty, Director of Safeguarding</p>

          <p>Andrew Cunningham, Deputy Head of Digital and Service Delivery (acting)</p>

          <p>Gareth Wilks, Interim Director of Policy and Customer Engagement</p>

          <h3>Non-executive members</h3>

          <p>Christopher Wroath, Non-executive Director</p>

          <p>Keith Rosser, Non-executive Director</p>

          <p>Alastair Sim, Non-executive Director</p>

          <p>Lesley Muirhead, Non-executive Director</p>

          <p>Martin Gallagher, Non-executive Director</p>

          <p>Morven MacLean, Non-executive Director</p>

          <h2>Audit and risk committee</h2>

          <p>The audit and risk committee gives an independent view of our:</p>

          <ul>
           <li>financial management</li>
           <li>statutory reporting</li>
           <li>risk, control and governance</li>
          </ul>

          <p>This supports our Chief Executive (as our 'Accountable Officer') with their responsibilities in these areas.</p>

          <p>The committee reports to the Chief Executive and board after each meeting.</p>

          <h3>Committee members</h3>

          <p>Sarah Pumfrett, chair, Non-executive Director</p>

          <p>Keith Rosser, Non-executive Director</p>

          <p>Stephanie Glavin, Non-executive Director</p>

          <p>Lesley Muirhead, Non-executive Director</p>

          <h2>Minutes</h2>

          <p>You can get minutes from our:</p>

          <ul>
           <li><a href="disclosure-scotland-board-meeting-minutes_1">board meetings</a></li>
           <li><a href="disclosure-scotland-audit-and-risk-committee-minutes">audit and risk committee meetings</a></li>
          </ul>

          <h2>Register of interests</h2>

          <p><a href="disclosure-scotland-register-of-interests_1">Check the board's register of interests</a>.</p>
