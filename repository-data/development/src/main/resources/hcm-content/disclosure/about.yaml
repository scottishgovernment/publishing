        jcr:primaryType: hippostd:html
        hippostd:content: |-
          <h2>Laws that currently govern our work</h2>

          <p>Laws that currently govern our work include:</p>

          <ul>
           <li>the Protection of Vulnerable Groups (Scotland) Act 2007</li>
           <li>Part V of the Police Act 1997</li>
           <li>the&nbsp;Age of Criminal Responsibility (Scotland) Act 2019&nbsp;</li>
          </ul>

          <p>For more on our legal duties, <a href="index">check our governance documents</a>.</p>

          <h2>New laws that will change our work</h2>

          <p>By 1 April 2025, we’ll make changes to our services set out in the Disclosure (Scotland) Act 2020.</p>

          <p>These include:</p>

          <ul>
           <li>fewer disclosure levels</li>
           <li>changes to PVG scheme membership</li>
           <li>new referral powers for councils and integration boards</li>
          </ul>

          <p><a href="how-our-services-will-be-changing">Find out more about how we're implementing the Act</a>.</p>
