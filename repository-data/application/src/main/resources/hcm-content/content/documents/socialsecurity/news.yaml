          publishing:topics: [adult-disability-payment, best-start-foods]
          /publishing:contentBlocks:
            jcr:primaryType: publishing:cb_richtext
            publishing:noindex: false
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p><strong>Be</strong><strong>ware scam texts and emails</strong></p>

                <p>Recent news reports have highlighted concerns about scam texts being sent to people in Scotland. Some recent messages have told people they are about to miss out on help with their heating bills.</p>

                <p>We want to reassure people that Child Winter Heating Payment, Winter Heating Payment and our new Pension Age Winter Heating Payment are automatic for almost everyone who is eligible.</p>

                <p>Any emails, texts, letters or calls from us will always be about a recent application for a benefit or payment or about an automatic payment you have become eligible for.</p>

                <p>We will never ask for personal or financial details by text or email or ask you to reply by text or email.</p>

                <p>If you think you have been the victim of fraud, contact your bank immediately.</p>

                <p>Report fraud to Police Scotland by calling 101.</p>

                <p><a href="https://www.mygov.scot/contact-from-social-security-scotland">Find out more about staying safe from scams.</a></p>

                <p><strong>Tips to identify scam messages:</strong></p>

                <ul>
                 <li>be suspicious of messages asking you to send money or share personal information such as passwords or bank details</li>
                 <li>scammers try to create panic by setting a time limit or saying something frightening. Stop and think before giving out information</li>
                 <li>don’t follow links in suspicious emails or download files</li>
                 <li>check phone numbers and email addresses on the official websites</li>
                 <li>use 'contact us' sections to access information and services</li>
                </ul>

                <p>We offer free assistance to support people making applications for benefits. Find out more at&nbsp;<a href="http://mygov.scot/benefits-support">mygov.scot/benefits-support</a></p>
