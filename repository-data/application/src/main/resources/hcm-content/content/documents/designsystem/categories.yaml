          publishing:summary: Good practice web analytics advice for getting your
            service/website ready for performance monitoring and reporting.
          publishing:title: Analytics
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: "<p>Every website should have its performance monitored\
                \ regularly - this allows the service owner to identify issues and\
                \ use the data to make better decisions as outlined in the Digital\
                \ Scotland Service Standard’s <a href=\"https://www.gov.scot/publications/digital-scotland-service-standard/pages/9--define-what-success-looks-like-and-publish-performance-data/\"\
                >‘Define what success looks like and publish performance data’ criteria</a>.</p>\n\
                \n<p>To do this you will need to set up certain tools for your website\
                \ or service. These are:</p>\n\n<ul>\n <li>A tag management system\
                \ (optional for smaller websites/services, highly recommended for\
                \ larger projects or any without in-house developers)</li>\n <li>A\
                \ web analytics package(s) (which allow you to record your service’\
                s data, such as the number of users, and to output the data on a dashboard)\
                \ - this could include <a href=\"https://matomo.org/\">Matomo</a>,\
                \ <a href=\"https://analytics.google.com/\">Google Analytics</a>,\
                \ <a href=\"http://www.adobe.com/uk/marketing-cloud/web-analytics.html\"\
                >Adobe web analytics</a>, etc.</li>\n <li>A dashboarding tool (optional)\
                \ - this could include <a href=\"https://www.klipfolio.com/\">Klipfolio</a>,\
                \ <a href=\"https://powerbi.microsoft.com/\">PowerBI</a> or <a href=\"\
                https://lookerstudio.google.com/\">Google Looker Studio</a></li>\n\
                \ <li>The search console for key search engines (if your service is\
                \ web-based)</li>\n <li>Additional analytics tools to collect supplemental\
                \ information (optional) - this could include heatmapping tools</li>\n\
                </ul>\n\n<p>Scottish Government Design System sites primarily use\
                \ Google Tag Manager (GTM) and Google Analytics (GA).</p>\n\n<h2>Using\
                \ data attributes as triggers</h2>\n\n<p>In order to create patterns\
                \ and components which can be tracked in a range of different web\
                \ analytics tools and which will work well for GTM/GA, we use data\
                \ attributes as triggers, rather than relying on click classes which\
                \ are more likely to change over time. The use of data attributes\
                \ also helps us minimise the number of tags that are required.</p>\n\
                \n<p>The Design System has a <a href=\"index\">‘tracking’ script</a>\
                \ that adds these data attributes.</p>\n\n<p>Our triggers are specific\
                \ and our tags are more general, meaning that there is a trigger per\
                \ component and multiple triggers fire the same tag. Our patterns\
                \ are trackable without the need for custom JavaScript in Google Tag\
                \ Manager.</p>\n\n<p>In our reporting, our Event Category contains\
                \ the name of the tag. For most of the tracking these this will work\
                \ in Google Tag Manager:</p>\n\n<pre>\n<code class=\"language-markdown\"\
                >event name: navigation \npage_path: {{Page Path}}\ntype: {{AEV –\
                \ data-navigation/footer/header/search}} \nclick_text: {{Click Text}}\n\
                path: {{AEV – Path}}</code></pre>\n\n<p>The Design System performance\
                \ team have created a Google Tag Manager container which can be imported\
                \ if you are building a site with the Design System. <a href=\"https://github.com/scottish-government-design-system/designsystem-assets/releases/download/0.7/designsystemgtm.json\"\
                >Download the Google Tag Manager container</a> or <a href=\"mailto:performance@gov.scot\"\
                >contact the performance team</a>.</p>\n\n<h2>Alternative tools</h2>\n\
                \n<p>There are a range of different tools available - from free/open\
                \ source through to paid/enterprise - to do these tasks. We use a\
                \ mix of tools, including Google Analytics.</p>\n\n<p>Google Analytics\
                \ is widely used across the Scottish Government. The setup outlined\
                \ in the pages in this section has already been tested and approved\
                \ for data security and is based on free products, so there’s no need\
                \ to go through procurement. We have documented a setup which is strong\
                \ on interoperability, simplicity, available documentation and is\
                \ largely based on free products but other web analytics packages\
                \ are available and may be better suited to your needs. Analytics\
                \ tools which do not rely on cookies are also available and should\
                \ be considered when deciding on an analytics solution - these include\
                \ <a href=\"https://simpleanalytics.com/\">Simple Analytics</a>, <a\
                \ href=\"https://usefathom.com/\">Fathom</a> and <a href=\"https://plausible.io/\"\
                >Plausible Analytics</a>.</p>"
