          hippostdpubwf:createdBy: jonathan.sutcliffe@gov.scot
          hippostdpubwf:creationDate: 2023-07-06T14:08:16.819+01:00
          hippostdpubwf:lastModificationDate: 2023-12-22T08:49:19.757Z
          hippostdpubwf:lastModifiedBy: jonathan.ellis@gov.scot
          hippostdpubwf:publicationDate: 2023-12-22T08:49:22.566Z
          hippotranslation:id: 4b91e9c3-d57e-483d-bb47-0b3d8e3d0a41
          hippotranslation:locale: ''
          publishing:audience: ''
          publishing:authorNotes: ''
          publishing:deprecated: false
          publishing:experimental: false
          publishing:metaDescription: Scottish Government Design System guidance on
            tracking a campaign
          publishing:noindex: false
          publishing:publicationDate: 0001-01-01T12:00:00Z
          publishing:reportingtags: []
          publishing:sensitive: false
          publishing:seoTitle: Campaign tracking
          publishing:serviceproviders: []
          publishing:showFeedback: true
          publishing:showInParent: true
          publishing:summary: ''
          publishing:title: Campaign tracking
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>When tracking a paid, social or email campaign it is best to tag links with parameters that allow website analytics tools to better report on how the campaign performed. When you do this the URL will look like this: <code>https://www.example.com/?utm_source=summer-mailer&amp;utm_medium=email&amp;utm_campaign=summer-sale</code></p>

                <p>You can set up your link parameters using this tool: <a href="https://ga-dev-tools.google/ga4/campaign-url-builder/">Campaign URL Builder</a></p>

                <p>From Google’s help page, the essential parameters are <code>utm_source</code>, <code>utm_medium</code> and <code>utm_campaign</code>: <a href="https://support.google.com/analytics/answer/10917952">URL builders: Collect campaign data with custom URLs</a></p>

                <ul>
                 <li><code>utm_source</code> Referrer, for example: google, newsletter, billboard</li>
                 <li><code>utm_medium</code> Marketing medium, for example: cpc, banner, email</li>
                 <li><code>utm_campaign</code> Product, slogan, promo code, for example: spring_sale</li>
                </ul>

                <div class="ds_inset-text">
                <div class="ds_inset-text__text focus-visible">
                <p>For the <code>utm_medium</code> parameter, anything which is paid-for (including paid advertising on social media) you should set the value to 'paid'. For non-paid social media links set the value to 'social'. Learn how <a href="https://support.google.com/analytics/answer/9756891?hl=en">Google Analytics classifies souce/medium data for channel groupings</a>. <a href="https://utmprep.com/utm-validator/">Test your URLs here</a>.</p>
                </div>
                </div>

                <p>We also recommend adding the parameters to any short or ‘vanity’ redirects. For our sites that means adding a redirect from a friendly URL that can be included on something like a print or TV advert (for example, <code>mygov.scot/renters</code>) which then gets redirected in the back-end of our CMS to a URL which has the tracking code attached, for example:</p>

                <pre>
                <code class="language-html">https://www.mygov.scot/private-rental-rights?utm_source=shorturl&amp;utm_medium=cpc&amp;utm_campaign=renters_rights</code></pre>

                <div class="ds_inset-text">
                <div class="ds_inset-text__text">
                <p>Putting <code>utm_source</code> in the parameter overwrites the referring site source URL and so vanity URLs are best for print/TV where there is no better way to track. In all cases where you use campaign tracking by adding parameters to a URL you should ensure that the full tagged URL contains all of the information that you need.&nbsp;</p>
                </div>
                </div>

                <p>Ideally any paid advertising ads would be consistently tagged.&nbsp; In Google Ads this can be done through templates which can be set via the account settings "tracking" section.&nbsp;</p>

                <pre>
                <code class="language-html">{lpurl}?utm_source={network}&amp;utm_medium=cpc&amp;utm_id={campaignid}&amp;ad_group_id={a
                dgroupid}&amp;ad_id={creative}&amp;placement_id={placement}&amp;gclid={gclid}</code></pre>

                <p>&nbsp;</p>
