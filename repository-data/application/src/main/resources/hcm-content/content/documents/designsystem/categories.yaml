              hippo:values: []
            /publishing:internal:
              jcr:primaryType: hippo:mirror
              hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:contentblocks[3]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>If you are setting up your own event tracking we recommend adding document/download tracking, email link tracking and external link tracking.</p>

                <h2>Google Tag Manager - additional reading</h2>

                <ul>
                 <li><a href="https://www.simoahava.com/analytics/awesome-google-tag-manager-resources/">Simo Ahava: Some awesome google tag manager resources</a></li>
                 <li><a href="https://www.optimizesmart.com/beginners-guide-google-tag-manager-v2/">Optimize Smart: Google Tag Manager turorial 2021</a></li>
                 <li><a href="https://ipullrank.com/google-tag-manager">iPullRank: Complete guide to Google Tag Manager</a></li>
                 <li><a href="https://web.archive.org/web/20211019093224/https://www.digitalmarketer.com/blog/guide-to-google-tag-manager/">Digital Marketer: The Ultimate Guide to Google Tag Manager</a></li>
                 <li><a href="https://developers.google.com/tag-manager/">Google: Developer documentation for Google Tag Manager</a></li>
                 <li><a href="https://support.google.com/tagmanager/answer/6103657?hl=en">Google: Components of Google Tag Manager</a></li>
                 <li><a href="https://www.optimizesmart.com/event-tracking-in-google-tag-manager-v2-complete-guide/">Optimize Smart: Google Tag Manager event tracking tutorial</a></li>
                 <li><a href="https://www.simoahava.com/analytics/data-layer/">Simo Ahava: The Data Layer</a></li>
                 <li><a href="https://www.optimizesmart.com/google-tag-manager-data-layer-explained-like-never/">Optimize Smart: Google Tag Manager Data Layer tutorial</a></li>
                 <li><a href="https://developers.google.com/tag-manager/devguide">Google: Developer documentation for Data Layer</a></li>
                </ul>
