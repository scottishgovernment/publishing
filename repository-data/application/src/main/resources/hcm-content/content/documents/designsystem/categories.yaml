            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks[1]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p><a href="https://support.google.com/tagmanager/answer/6103696?hl=en">Google Tag Manager</a>&nbsp;(GTM) lets site owners add and update website tags - including tags for conversion tracking, site analytics and remarketing - without needing to edit your website’s code.</p>

                <p>To access and configure GTM:</p>

                <ul>
                 <li><a href="https://tagmanager.google.com/">Sign up using your team’s Google account</a></li>
                 <li>Create and name your account then create and name your first container. We suggest you use the following naming convention; domain - subdomain - environment e.g. mygov - www - live</li>
                 <li>Select the type of property for which you intend to use the container for. In most instances you’ll select ‘web’</li>
                 <li>Two code snippets will appear on screen, along with instructions on where to place them: place the code as instructed on all of your pages (this might require help from a developer)</li>
                 <li>Repeat the previous 3 steps for any additional containers i.e. for test environments. Follow the same naming convention as your other container, e.g. ‘mygov.scot - www - test’</li>
                 <li>Add the dataLayer snippet to your site (advanced). Here’s a&nbsp;<a href="https://www.optimizesmart.com/google-tag-manager-data-layer-explained-like-never/">guide on the dataLayer</a>&nbsp;and here are instructions from Google on&nbsp;<a href="https://developers.google.com/tag-manager/devguide">implementation for your developer</a>.</li>
                </ul>

                <p>Once GTM has been deployed to all pages, it lets you deploy your analytics tool/Google Analytics, enhanced tracking capability and any other tags where applicable, e.g. advertising floodlight tags/pixels, etc.</p>

                <p>The Design System performance team have created a Google Tag Manager container which can be imported if you are building a site with the Design System.&nbsp;Download the Google Tag Manager container below.&nbsp; If you have an questions please&nbsp;<a href="mailto:performance@gov.scot">contact the performance team</a>.</p>

                <ul>
                </ul>
          /publishing:contentblocks[2]:
            jcr:primaryType: publishing:dsattachmentblock
            publishing:external: https://github.com/scottish-government-design-system/designsystem-assets/releases/download/0.7/designsystemgtm.json
            publishing:icon: file
            publishing:size: 267kb
            publishing:title: Design System Google Tag Manager container
            publishing:type: json
