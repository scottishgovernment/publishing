              hippostd:content: |-
                <p>We have defined a series of colour palettes to provide consistency in the way services present data using the Design System. This helps to build familiarity and trust with users.</p>

                <p>Our data visualisation palettes are based on the principles established by the <a href="https://analysisfunction.civilservice.gov.uk/policy-store/data-visualisation-colours-in-charts/">Government Analysis Function</a>, using colours derived from the Design System’s colour palettes.</p>

                <p>If you’re using R to produce charts the Scottish Government R package – <a href="https://scotgovanalysis.github.io/sgplot/">sgplot</a> is available, which includes the data visualisation palette colours.</p>
          /publishing:contentblocks[2]:
            jcr:primaryType: publishing:dspaletteblock
            publishing:headinglevel: h2
            publishing:title: Categorical data palette
            /publishing:paletteitems[1]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#002d54'
              publishing:colourname: Data vis dark blue
              publishing:name: ''
              publishing:varname: $ds_datavis__dark-blue
            /publishing:paletteitems[2]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#2b9c93'
              publishing:colourname: Data vis teal
              publishing:varname: $ds_datavis__teal
            /publishing:paletteitems[3]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#6a2063'
              publishing:colourname: Data vis purple
              publishing:varname: $ds_datavis__purple
            /publishing:paletteitems[4]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#e5682a'
              publishing:colourname: Data vis orange
              publishing:varname: $ds_datavis__orange
            /publishing:paletteitems[5]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#0b4c0b'
              publishing:colourname: Data vis dark green
              publishing:varname: $ds_datavis__dark-green
            /publishing:paletteitems[6]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#5d9f3c'
              publishing:colourname: Data vis green
              publishing:varname: $ds_datavis__green
            /publishing:paletteitems[7]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#592c20'
              publishing:colourname: Data vis brown
              publishing:varname: $ds_datavis__brown
            /publishing:paletteitems[8]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#ca72a2'
              publishing:colourname: Data vis pink
              publishing:varname: $ds_datavis__pink
          /publishing:contentblocks[3]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>The categorical data colour palette is based on colours from the Design System’s <a href="https://designsystem.gov.scot/styles/colour">primary</a> and <a href="https://designsystem.gov.scot/styles/colour-customisation">secondary palettes</a>. We've adjusted the lightness and saturation where necessary to meet minimum <a href="https://www.w3.org/WAI/WCAG21/Understanding/non-text-contrast.html">WCAG AA contrast requirements for graphical objects</a>. Each colour meets this requirement for both white (<code>#ffffff</code>) and off-white (<code>#f8f8f8</code>) backgrounds.</p>

                <p>The colours in the palette are designed to be used in the specified order. This maintains a high level of contrast between each colour and creates a consistent look across many types of data visualisations.</p>

                <h2>Using colour for categorial data</h2>

                <p>Categorical data is information which can be divided into specific groups. For example the group ‘eye colour’ could contain the values amber, blue, brown, green, grey.</p>

                <p>Only use additional colours from the palette when required. For ungrouped data in vertical and horizontal bar charts, the dark blue should be used.</p>

                <h4>Figure 1: Office coffee consumption 2020-2023, litres per day</h4>
          /publishing:contentblocks[4]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A bar chart showing coffee consumption for a single office,
              measured in litres over the years 2020 to 2023. The bars are the same
              dark blue colour. The bar for 2020 shows 10 litres. For 2021 it drops
              to 9. In 2022 it increases to 11 and in 2023 it is 12 litres.
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: c77c32dd-93d8-4090-a62c-4c855d1216ba
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[5]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>As more categories are added you should use additional colours following the specified order in the palette.</p>

                <h4>Figure 2: Office caffeinated drink consumption 2020-2023, litres per day</h4>

                <h5>The legend is presented in the same order as the bars in each cluster.</h5>
          /publishing:contentblocks[6]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A bar chart labelled "Office caffeinated drink consumption
              2020 to 2023" showing two grouped values. Coffee is represented by a
              dark blue bar. Tea is represented by a teal bar. In 2020 office coffee
              consumption is 10 litres per day and tea 4. In 2021 coffees consumption
              is 9 litres per day and tea is 6. In 2022 coffee consumption is 11 litres
              per day and tea is 8. In 2023 coffee consumption is 12 litres per day
              and tea is 9.
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: 7612a58c-6b0b-45d8-acf7-3064ca83e76f
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[7]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: <p>We recommend a maximum of four colours in a chart.
                If you feel you need more than four, think about how you could redesign
                your chart to avoid this. If you must use more than four colours,
                the main-extended palette can be used in the specified order.</p>
          /publishing:contentblocks[8]:
            jcr:primaryType: publishing:dspaletteblock
            publishing:headinglevel: h2
            publishing:title: Sequential data palette
            /publishing:paletteitems[1]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#002d54'
              publishing:colourname: Data vis dark blue
              publishing:name: ''
              publishing:varname: $ds_datavis__dark-blue
            /publishing:paletteitems[2]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#0065bd'
              publishing:colourname: Data vis blue
              publishing:varname: $ds_datavis__blue
            /publishing:paletteitems[3]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#55a8f2'
              publishing:colourname: Data vis light blue
              publishing:varname: $ds_datavis__light-blue
          /publishing:contentblocks[9]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>You should use the sequential palette when the order of the data has meaning, such as different age groups.</p>

                <p>As this palette is made up of tints of the same colour, there are some issues with contrast as neither the dark or light blue meets 3:1 contrast with the mid blue. The light blue does not meet 3:1 contrast against white or off-white. To address this there should be a gap between each bar and each should use the dark blue as an outline.&nbsp;</p>

                <h4>Figure 3: Average number of caffeinated drinks per day 2020 to 2022, by age group</h4>

                <h5>The legend is presented in the same order as the bars in each cluster.</h5>
          /publishing:contentblocks[10]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: 'A bar chart labelled "Average number of caffeinated drinks
              per day 2020 to 2022, by age group. A legend shows three age groups,
              15 to 24 is dark blue, 25 to 34 is blue and 35 to 44 is light blue.
              Clustered bars show the average number of caffeinated drinks for each
              age group from 2020 to 2022. In 2020 the average drinks are as follows:
              15 to 24 shows 4, 25 to 34 shows 6 and 35 to 44 shows 5. In 2021 the
              average drinks are as follows: 15 to 24 shows 4, 25 to 34 shows 8 and
              35 to 44 shows 7. In 2022 the average drinks are as follows: 15 to 24
              shows 5, 25 to 34 shows 7 and 35 to 44 shows 6.'
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: 0558f955-8898-49a6-ad83-bb2a4cbe8cb4
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[11]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: <p>The legend of grouped bar charts should also match
                the order of the bars and it should say this above the chart.</p>
          /publishing:contentblocks[12]:
            jcr:primaryType: publishing:dspaletteblock
            publishing:headinglevel: h2
            publishing:title: Focus charts palette
            /publishing:paletteitems[1]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#002d54'
              publishing:colourname: Data vis dark blue
              publishing:name: ''
              publishing:varname: $ds_datavis__dark-blue
            /publishing:paletteitems[2]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#949494'
              publishing:colourname: Data vis medium grey
              publishing:varname: $ds_datavis__medium-grey
          /publishing:contentblocks[13]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>You can use the focus charts palette to emphasise a specific element of a plot.</p>

                <p>This palette contains the dark blue and a medium grey. The grey in this palette has good contrast against the dark blue and meets the necessary requirements against white (#ffffff) but not off-white (#f8f8f8). Therefore data visualisations using this palette should only use a white background.</p>

                <p>The focus line should also be slightly thicker than the non-focussed lines in the chart, in this example the focus line is one pixel thicker.&nbsp;We only recommend using this approach when it's essential to communicate your message.</p>

                <h4>Figure 4: Scottish workplace average caffeine consumption 2016-2022 (mg)</h4>
          /publishing:contentblocks[14]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: Line chart comparing average daily caffeine consumption
              per year from 2016 to 2022 in Scotland and six nearby countries with
              similar sized populations. Scotland has seen a significant drop from
              2021 to 2022 while the majority of other countries have seen increases.
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: ed46afe7-b6d1-4216-97ef-82f47be45348
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[15]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <h2>Data visualisation and accessibility</h2>

                <p>It is important that the data visualisations produced by the Scottish Government can be understood by as many as people as possible, including those who perceive colours differently.</p>

                <p>Poor colour use can cause problems such as:</p>

                <ul>
                 <li>
                 <p>people who are colour blind may not be able to understand a chart that uses different colours for different parts of the chart</p>
                 </li>
                 <li>
                 <p>people who have low vision may not be able to read text that's a light colour on a white background</p>
                 </li>
                 <li>
                 <p>people using a mobile phone when it's sunny may not be able to see low contrast text or tell the difference between colours.</p>
                 </li>
                </ul>

                <h2>Development</h2>

                <p>The data visualisation palettes are based on the principles defined by the <a href="https://analysisfunction.civilservice.gov.uk/">Government Analysis Function</a>. Their website contains in depth guidance and training materials on many aspects of data visualisation.</p>

                <p>We used the <a href="https://projects.susielu.com/viz-palette?colors=[%22#002d54%22,%22#2b9c93%22,%22#6a2063%22,%22#e5682a%22,%22#0b4c0b%22,%22#5d9f3c%22,%22#592c20%22,%22#ca72a2%22]&amp;backgroundColor=%22white%22&amp;fontColor=%22black%22&amp;mode=%22normal%22">Viz Palette tool</a> to test palette combinations against different types of colour blindness. We also sought advice and input from accessibility and data experts within our organisation.</p>
          /publishing:UpdateHistory:
            jcr:primaryType: publishing:UpdateHistory
            publishing:lastUpdated: 2023-08-24T00:00:00+01:00
            publishing:updateText: First published
            /publishing:updateTextLong:
              jcr:primaryType: hippostd:html
              hippostd:content: Added guidance on <a href="data-visualisation-colour-palettes">colour
                palettes for data visualisation</a>
              /data-visualisation-colour-palettes:
                jcr:primaryType: hippo:facetselect
                hippo:docbase: bd3ecbd9-f45d-4d2f-b33f-b4966a304aa1
                hippo:facets: []
                hippo:modes: []
                hippo:values: []
