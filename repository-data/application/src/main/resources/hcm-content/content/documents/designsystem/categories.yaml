          publishing:showInParent: true
          publishing:summary: The data visualisation palettes are collections of colours
            intended to help charts meet Web Content Accessibility Guidelines (WCAG)
            standards.
          publishing:title: 'Data visualisation: colour palettes'
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks[1]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>We have defined a series of colour palettes to provide consistency in the way services present data using the Design System. This helps to build familiarity and trust with users.</p>

                <p>Our data visualisation palettes are based on the principles established by the <a href="https://analysisfunction.civilservice.gov.uk/policy-store/data-visualisation-colours-in-charts/">Government Analysis Function</a>, using colours derived from the Design System’s colour palettes.</p>

                <p>If you’re using R to produce charts the Scottish Government R package – <a href="https://scotgovanalysis.github.io/sgplot/">sgplot</a> is available, which includes the data visualisation palette colours.</p>
          /publishing:contentblocks[2]:
            jcr:primaryType: publishing:dspaletteblock
            publishing:headinglevel: h2
            publishing:title: Categorical data palette
            /publishing:paletteitems[1]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#002d54'
              publishing:colourname: Data vis dark blue
              publishing:name: ''
              publishing:varname: $ds_datavis__dark-blue
            /publishing:paletteitems[2]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#2b9c93'
              publishing:colourname: Data vis teal
              publishing:varname: $ds_datavis__teal
            /publishing:paletteitems[3]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#6a2063'
              publishing:colourname: Data vis purple
              publishing:varname: $ds_datavis__purple
            /publishing:paletteitems[4]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#e5682a'
              publishing:colourname: Data vis orange
              publishing:varname: $ds_datavis__orange
            /publishing:paletteitems[5]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#0b4c0b'
              publishing:colourname: Data vis dark green
              publishing:varname: $ds_datavis__dark-green
            /publishing:paletteitems[6]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#5d9f3c'
              publishing:colourname: Data vis green
              publishing:varname: $ds_datavis__green
            /publishing:paletteitems[7]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#592c20'
              publishing:colourname: Data vis brown
              publishing:varname: $ds_datavis__brown
            /publishing:paletteitems[8]:
              jcr:primaryType: publishing:dspaletteitem
              publishing:code: '#ca72a2'
              publishing:colourname: Data vis pink
              publishing:varname: $ds_datavis__pink
          /publishing:contentblocks[3]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>The categorical data colour palette is based on colours from the Design System’s <a href="https://designsystem.gov.scot/styles/colour">primary</a> and <a href="https://designsystem.gov.scot/styles/colour-customisation">secondary palettes</a>. We've adjusted the lightness and saturation where necessary to meet minimum <a href="https://www.w3.org/WAI/WCAG21/Understanding/non-text-contrast.html">WCAG AA contrast requirements for graphical objects</a>. Each colour meets this requirement for both white (<code>#ffffff</code>) and off-white (<code>#f8f8f8</code>) backgrounds.</p>

                <p>The colours in the palette are designed to be used in the specified order. This maintains a high level of contrast between each colour and creates a consistent look across many types of data visualisations.</p>

                <h2>Using colour for categorial data</h2>

                <p>Categorical data is information which can be divided into specific groups. For example the group ‘eye colour’ could contain the values amber, blue, brown, green, grey.</p>

                <p>Only use additional colours from the palette when required. For ungrouped data in vertical and horizontal bar charts, the dark blue should be used.</p>

                <h4>Figure 1: Office coffee consumption 2020-2023, litres per day</h4>
          /publishing:contentblocks[4]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A bar chart showing coffee consumption for a single office,
              measured in litres over the years 2020 to 2023. The bars are the same
              dark blue colour. The bar for 2020 shows 10 litres. For 2021 it drops
              to 9. In 2022 it increases to 11 and in 2023 it is 12 litres.
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: c77c32dd-93d8-4090-a62c-4c855d1216ba
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[5]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>As more categories are added you should use additional colours following the specified order in the palette.</p>

                <h4>Figure 2: Office caffeinated drink consumption 2020-2023, litres per day</h4>

                <h5>The legend is presented in the same order as the bars in each cluster.</h5>
          /publishing:contentblocks[6]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A bar chart labelled "Office caffeinated drink consumption
              2020 to 2023" showing two grouped values. Coffee is represented by a
              dark blue bar. Tea is represented by a teal bar. In 2020 office coffee
              consumption is 10 litres per day and tea 4. In 2021 coffees consumption
              is 9 litres per day and tea is 6. In 2022 coffee consumption is 11 litres
              per day and tea is 8. In 2023 coffee consumption is 12 litres per day
              and tea is 9.
            publishing:caption: ''
            publishing:overflow: false
            /publishing:image:
