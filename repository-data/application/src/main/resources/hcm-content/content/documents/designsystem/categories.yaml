          jcr:primaryType: publishing:dsarticle
          jcr:mixinTypes: ['mix:referenceable']
          jcr:uuid: d8aae4c6-1308-4857-bc28-e51d7f3452cb
          hippo:availability: []
          hippostd:retainable: false
          hippostd:state: draft
          hippostdpubwf:createdBy: jonathan.sutcliffe@gov.scot
