              hippostd:content: |-
                <p>The Design System includes styles and layout tools to support form structure and design:</p>

                <ul>
                 <li><a href="focus-states">Focus states</a></li>
                 <li><a href="responsive-spacing">Responsive spacing</a></li>
                </ul>

                <p>The following Design System components can be used to construct your forms:</p>

                <ul>
                 <li><a href="index">Autocomplete</a></li>
                 <li><a href="index_1">Button</a></li>
                 <li><a href="index_2">Character count</a></li>
                 <li><a href="index_3">Checkboxes</a></li>
                 <li><a href="index_4">Date picker</a></li>
                 <li><a href="index_5">Error message</a></li>
                 <li><a href="index_6">Error summary</a></li>
                 <li><a href="index_7">Notification panel</a></li>
                 <li><a href="index_8">Radio buttons</a></li>
                 <li><a href="index_9">Select (dropdown)</a></li>
                 <li><a href="index_10">Text input</a></li>
                 <li><a href="index_11">Textarea</a></li>
                </ul>

                <p>The following patterns in the Design System can be used as reference to solving common problems:</p>

                <ul>
                 <li><a href="index_12">Address lookup</a></li>
                 <li><a href="index_13">Task list</a></li>
                </ul>
