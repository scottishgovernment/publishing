              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>The Scottish Government Design System has accessibility built in as a key feature. If there are specific accessibility notes for a component or pattern in the Design System, you’ll find them with the component or pattern.</p>

                <p>This page outlines some general best practice guidelines to think about when creating digital services.</p>

                <h2>Keyboard interaction</h2>

                <p>For keyboard users, such as people who use a screen reader, it is essential that all content can be interacted without using a mouse. For elements such as links, buttons and native form elements the browser and operating system ensures this functionality. Widgets that have no native element, such as an accordion or disclosure widget, require developers to ensure that they can be used with a keyboard.</p>

                <p>The <a href="https://www.w3.org/TR/wai-aria-practices-1.1/">ARIA Authoring Practices</a> provides extensive guidance on what keyboard interactions are required for widgets.</p>

                <h2>Styling for keyboard focus</h2>

                <p>For sighted keyboard only users it is important that the interactive element that they are focussed on is clearly identified. This includes links, buttons and form fields. Relying on the browser to do this is usually not sufficient since some browser default options for focus styling is too subtle.</p>

                <p>Focus styling can easily be included using the CSS pseudo selector <code>:focus</code>. It may be sufficient to use the same styling for <code>:hover</code>. However, it is better to have something more visually noticeable for focus styling. For example mygov.scot uses:</p>

                <pre>
                <code class="language-css">a:focus {
                    background-color: #fdd522;
                    outline: 2px solid #fdd522;
                }</code></pre>

                <h2>Colour contrast</h2>

                <p>For some people poor contrast between the foreground colour of text and its background can make the text extremely difficult or impossible to read. This applies to text on images, gradients, buttons and other elements.</p>

                <p>Ensure that the colours used in your palette are selected so that they offer a good contrast. Colours can be checked using tools such as <a href="https://contrast-finder.tanaguru.com/">Tanaguru contrast finder</a>. This tool can also offer alternatives close to your selected colours.</p>

                <h2>Alternative text</h2>

                <p>All images must have alternative text provided that describes the information or function of the image. A simple trick to help deciding on alternative text is to imagine you are reading the page to someone over the phone. What would you say to them about the image? Is it a graph showing a clear trend? Does it convey an idea that supports the text content? Is it a person? Are they doing something important? Or is the image simply for decoration and doesn’t add anything to the meaning of the page?</p>

                <p>The Web Accessibility Tutorials from W3C includes a useful <a href="https://www.w3.org/WAI/tutorials/images/decision-tree/">alt decision tree</a> that can help you decide what alternative text you need to include.</p>

                <h2>Heading structure</h2>

                <p>Headings communicate the organisation of a page and are extremely useful in helping people navigate pages. Headings are ranked from <code>&lt;h1&gt;</code>, the most important, to <code>&lt;h6&gt;</code> the least. Avoid skipping headings, for example having an <code>&lt;h4&gt;</code> following an <code>&lt;h2&gt;</code>. People who rely on the ranking to help them understand the content can be confused with skips like this.</p>

                <p>The heading conveys meaning about the content so avoid using headings just for they style. Conversely, if something is styled to look like a heading then it should be marked up as a heading to convey that meaning in code.</p>

                <h2>Visually hiding content</h2>

                <p>There are sometimes instances where screen reader users need content but sighted users do not. In each instance it is worth thinking if this really is the case: if the content is important enough for some users, why not others?</p>

                <p>When hiding content that you want screen reader users to still be able to accesss never use <code>display: none</code> or <code>visibility: hidden</code>. These will remove the content from all ‘displays’ including screen reader ‘displays’. Similarly giving an element a height or width of 0 will remove it from the content flow and most screen readers will ignore it.</p>

                <p>The following CSS is an accessible method of hiding content visually, and it is what the Design System uses.</p>

                <pre>
                <code class="language-css">.visually-hidden {
                    clip: rect(1px, 1px, 1px, 1px);
                    height: 1px;
                    overflow: hidden;
                    position: absolute !important;
                    width: 1px;
                }</code></pre>

                <h2>Accessible Rich Internet Applications (ARIA)</h2>

                <p>ARIA provides a set of attributes that add additional information to HTML elements. The aim was to provide developers ways to make non-native widgets more accessible. Since ARIA was created and adopted there are more native HTML elements that reduce the necessity of ARIA.</p>

                <p>ARIA will not automatically make your HTML more accessible. Poorly used ARIA may add nothing or, worse, lead to more confusing interactions for people. Try to use native elements where possible.</p>

                <p>Where this is not possible, consult the <a href="https://www.w3.org/TR/wai-aria-practices-1.1/">ARIA Authoring Practices</a> to ensure you are using ARIA in line with best practice.</p>
