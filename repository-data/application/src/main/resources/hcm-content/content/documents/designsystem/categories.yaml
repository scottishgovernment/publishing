                <p>We have defined a series of colour palettes to provide consistency in the way services present data using the Design System. This helps to build familiarity and trust with users.</p>

                <p>Our data visualisation palettes are based on the principles established by the <a href="https://analysisfunction.civilservice.gov.uk/policy-store/data-visualisation-colours-in-charts/">Government Analysis Function</a>, using colours derived from the Design System’s colour palettes.</p>

                <p>If you’re using R to produce charts the Scottish Government R package – <a href="https://scotgovanalysis.github.io/sgplot/">sgplot</a> is available, which includes the data visualisation palette colours.</p>
