        jcr:uuid: 8eaa12e6-a8df-4350-a779-dbef51454eac
        hippo:name: Form content
        hippo:versionHistory: 256e22b9-8f19-4dd7-9c4b-d8fe1c6b43f5
        /form-content[1]:
          jcr:primaryType: publishing:dsarticle
          jcr:mixinTypes: ['mix:referenceable']
          jcr:uuid: a07bd0c9-7d18-42b7-922a-9890fdffb5cc
          hippo:availability: []
          hippostd:retainable: false
          hippostd:state: draft
          hippostdpubwf:createdBy: jonathan.sutcliffe@gov.scot
          hippostdpubwf:creationDate: 2023-07-06T14:17:39.624+01:00
          hippostdpubwf:lastModificationDate: 2023-11-14T14:39:03.757Z
          hippostdpubwf:lastModifiedBy: jonathan.sutcliffe@gov.scot
          hippotranslation:id: d0acc517-59d6-412a-8ad9-8580664f2927
          hippotranslation:locale: ''
          publishing:audience: ''
          publishing:authorNotes: ''
          publishing:deprecated: false
          publishing:experimental: false
          publishing:metaDescription: Scottish Government Design System guidance on
            considering what questions you need to include in a form
          publishing:noindex: false
          publishing:publicationDate: 0001-01-01T12:00:00Z
          publishing:reportingtags: []
          publishing:sensitive: false
          publishing:seoTitle: Form content
          publishing:serviceproviders: []
          publishing:showFeedback: true
          publishing:showInParent: true
          publishing:summary: ''
          publishing:title: Form content
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>Your service’s requirements and the user needs must be fully understood before designing a new digital form, or updating an existing one. You should do user research to map the user journeys to decide what the form’s content should be.</p>

                <p>When developing the form, you should do the following:</p>

                <h2>Identify all the information you need to collect</h2>

                <p>Use your research findings to make a list of the information your form needs to collect from users. This becomes the basis for designing the form questions.</p>

                <h2>Review the form questions</h2>

                <p>Once you know what information to collect, validate this using a tool called a&nbsp;<a href="https://www.gov.uk/service-manual/design/form-structure#know-why-youre-asking-every-question">‘question protocol’</a>. This step helps you identify which form questions you need. It can be used to reduce the size of a form.</p>

                <p>For each question, the protocol should be used to check that you know:</p>

                <ul>
                 <li>why you need the information to deliver your service</li>
                 <li>what you’ll do with it</li>
                 <li>which users need to give you the information</li>
                 <li>how you’ll check the information is accurate</li>
                 <li>how to keep the information up to date and secure</li>
                </ul>

                <p>If a question asks for more than one piece of information they all should be reviewed against the above list.</p>

                <div class="ds_inset-text">
                <div class="ds_inset-text__text">
                <p>Keep your forms as simple as possible. Only ask what's needed to run your service.</p>
                </div>
                </div>

                <h2>Each form question has costs</h2>

                <p>Each question has a cost. Only ask for information that is needed for your service.</p>

                <p>A financial cost is incurred by the organisation publishing the form, who must process and store the answers. A time cost and a cognitive cost is passed on to users for every extra question they have to complete.</p>

                <h2>Clearly explain why you’re asking for sensitive information</h2>

                <p>Users care about their privacy and information security. If you must ask for sensitive information, make sure you explain why it is needed. You should do this whenever you ask for sensitive information, even if you do this several times in the form.</p>

                <h2>Form question content design</h2>

