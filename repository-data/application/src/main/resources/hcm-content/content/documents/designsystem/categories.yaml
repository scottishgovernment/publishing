              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>A good form should have a well-defined structure and be easy for the user to complete.</p>

                <p>Always use a one column structure and design for mobile devices first. A form which avoids confusing structures is easier for the user to complete.</p>
          /publishing:contentblocks[2]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A form with its fields arranged in two columns, with a
              criss-crossing arrow suggesting one possible path through the fields
            publishing:caption: Multi-column layouts can create an unclear form structure.
            publishing:overflow: true
            /publishing:image:
              jcr:primaryType: hippogallerypicker:imagelink
