              publishing:colourname: Data vis light blue
              publishing:varname: $ds_datavis__light-blue
          /publishing:contentblocks[9]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>You should use the sequential palette when the order of the data has meaning, such as different age groups.</p>

                <p>As this palette is made up of tints of the same colour, there are some issues with contrast as neither the dark or light blue meets 3:1 contrast with the mid blue. The light blue does not meet 3:1 contrast against white or off-white. To address this there should be a gap between each bar and each should use the dark blue as an outline.&nbsp;</p>

