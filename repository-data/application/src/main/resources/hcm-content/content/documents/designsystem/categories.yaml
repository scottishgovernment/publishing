            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <h2>Accordion<a name="accordion" id="accordion"></a></h2>

                <p>Accordion header buttons get a <code>data-accordion</code> attribute whose value uses the pattern <code>accordion-[index]-[open/close]</code> where the index is one-based. Opening and closing an accordion panel updates that data attribute to denote the correct action (opening or closing).</p>

                <pre>
                <code class="language-html">&lt;button class="ds_accordion-item__header-button js-accordion-button" data-accordion="accordion-open-1"&gt;
                   Healthcare for veterans
                   &lt;span class="ds_accordion-item__indicator"&gt;&lt;/span&gt;
                &lt;/button&gt;</code></pre>

                <p>If an accordion has an ‘open all’ button, that button gets a <code>data-accordion</code> attribute whose value uses the pattern <code>accordion-[open/close]-all</code>. This attribute is updated to denote the correct action when accordion panels are opened or closed.</p>

                <pre>
                <code class="language-html">&lt;button data-accordion="accordion-open-all" type="button" class="ds_link  ds_accordion__open-all  js-open-all"&gt;Open all &lt;span class="visually-hidden"&gt;sections&lt;/span&gt;&lt;/button&gt;</code></pre>

                <h2>Autocomplete<a name="autocomplete" id="autocomplete"></a></h2>

                <p>When a user selects an autocomplete suggestion, a custom event is triggered. This event is slightly different for keyboard and pointer interactions, but the data is the same.</p>

                <pre>
                <code class="language-js">window.dataLayer.push({
                    event: 'autocomplete',
                    searchText: 'foo',
                    clickText: 'Working with football organisations',
                    resultsCount: 6,
                    clickedResults: 'result 2 of 6'
                });</code></pre>

                <p>The properties used in this event are:</p>

                <ul>
                 <li><code>searchText</code> User input from the form field</li>
                 <li><code>clickText</code> Text of the selected suggestion</li>
                 <li><code>resultsCount</code> Number of suggestions provided for this search text</li>
                 <li><code>clickedResults</code> Position of the selected suggestion in the list of suggestions</li>
                </ul>

                <h2>Back to top<a name="back-to-top" id="back-to-top"></a></h2>

                <p>Back to top links get a <code>data-navigation</code> attribute of <code>backtotop</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#page-top" class="ds_back-to-top__button js-initialised" data-navigation="backtotop"&gt;Back to top&lt;/a&gt;</code></pre>

                <h2>Breadcrumbs<a name="breadcrumbs" id="breadcrumbs"></a></h2>

                <p>Breadcrumb links get a <code>data-navigation</code> attribute whose value uses the pattern <code>breadcrumb-[index]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_breadcrumbs__link" href="#" data-navigation="breadcrumb-1"&gt;Home&lt;/a&gt;</code></pre>

                <h2>Button<a name="button" id="button"></a></h2>

                <p>Buttons get a <code>data-button</code> attribute whose value uses the pattern <code>button-[slug of the button text]</code>.</p>

                <pre>
                <code class="language-html">&lt;button class="ds_button" data-button="button-start-here"&gt;
                    Start here
                &lt;/button&gt;</code></pre>

                <p>The slug uses all of the text on the button, including text that is visually hidden. For example, you might have an icon-only button that uses hidden text to help users of assistive technology.</p>

                <pre>
                <code class="language-html">&lt;button type="button" class="ds_button" data-button="button-search"&gt;
                    &lt;span class="visually-hidden"&gt;Search&lt;/span&gt;
                    &lt;svg class="ds_icon" aria-hidden="true" role="img"&gt;&lt;use href="/path/to/icons.stack.svg#search"&gt;&lt;/use&gt;&lt;/svg&gt;
                &lt;/button&gt;</code></pre>

                <h2>Category list<a name="category-list" id="category-list"></a></h2>

                <p>Category list links get a <code>data-navigation</code> attribute whose value uses the pattern <code>category-item-[index]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_category-item__link" data-navigation="category-item-3"&gt;Farming and rural issues&lt;/a&gt;</code></pre>

                <h2>Checkboxes<a name="checkboxes" id="checkboxes"></a></h2>

                <p>Checkboxes get a <code>data-form</code> attribute whose value uses the pattern <code>checkbox-[checkbox ID]</code>.</p>

                <pre>
                <code class="language-html">&lt;input class="ds_checkbox__input" id="education" type="checkbox" data-form="checkbox-education"&gt;</code></pre>

                <p>When a user changes the state of a checkbox or if it is already checked, its state is added to the data attribute.</p>

                <pre>
                <code class="language-html">&lt;input class="ds_checkbox__input" id="education" checked type="checkbox" data-form="checkbox-education-checked"&gt;</code></pre>

                <h2>Contact details<a name="contact-details" id="contact-details"></a></h2>

                <p>Social media links inside contact detail components get a <code>data-navigation</code> attribute whose value uses the pattern <code>contact-details-[slug of the social media name]</code>.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_contact-details__social-link" href="#" data-navigation="contact-details-facebook"&gt;Facebook&lt;/a&gt;</code></pre>

                <p>Email links inside contact detail components get a <code>data-navigation</code> attribute whose value is <code>contact-details-email</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="mailto:designsystem@gov.scot" data-navigation="contact-details-email"&gt;designsystem@gov.scot&lt;/a&gt;</code></pre>

                <h2>Error message<a name="error-message" id="error-message"></a></h2>

                <p>Error messages get a <code>data-form</code> attribute whose value uses the pattern <code>error-[ID of the field that has the error]</code>.</p>

                <p>In the case of a radio button group, the attribute uses the pattern <code>error-[name of the radio group]</code>.</p>

                <pre>
                <code class="language-html">&lt;p class="ds_question__error-message" data-form="error-more-detail"&gt;This field is required&lt;/p&gt;</code></pre>

                <h2>Error summary<a name="error-summary" id="error-summary"></a></h2>

                <p>Links in error summaries get a <code>data-form</code> attribute whose value uses the pattern <code>error-[ID of the field that has the error]</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#resolve" data-form="error-resolve"&gt;Did this resolve your issue?&lt;/a&gt;</code></pre>

                <h2>Hide this page<a name="hide-this-page" id="hide-this-page"></a></h2>

                <p>Hide this page buttons get a <code>data-navigation</code> attribute of <code>hide-this-page</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="http://bbc.co.uk/weather" data-altlink="https://www.google.co.uk" class="ds_hide-page__button  ds_button  js-hide-page" data-navigation="hide-this-page"&gt;&lt;strong&gt;Hide this page&lt;/strong&gt; &lt;span class="visually-hidden  js-enabled-text"&gt;Or press escape key to hide this page&lt;/span&gt;&lt;/a&gt;</code></pre>

                <p>If the user triggers the ‘hide page’ action with their keyboard by pressing ‘Escape’ an event is pushed to the window’s <code>dataLayer</code>.</p>

                <pre>
                <code class="language-javascript">window.dataLayer.push({ 'event': 'hide-this-page-keyboard' });</code></pre>

                <h2>Inset text<a name="inset-text" id="inset-text"></a></h2>

                <p>Links in inset text components get a <code>data-navigation</code> attribute of <code>inset-link</code>.</p>

                <pre>
                <code class="language-html">&lt;div class="ds_inset-text"&gt;
                    &lt;div class="ds_inset-text__text"&gt;
                        You may be able to &lt;a data-navigation="inset-link" href="#"&gt;apply for free school meals&lt;/a&gt; at the same time as you apply for the clothing grant.
                    &lt;/div&gt;
                &lt;/div&gt;</code></pre>

                <h2>Links<a name="links" id="links"></a></h2>

                <h3>External links</h3>

                <p>External links get a <code>data-navigation</code> attribute of <code>link-external</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="https://www.gov.scot/policies/climate-change/emissions-trading-scheme/" data-navigation="link-external"&gt;Emissions Trading Scheme&lt;/a&gt;</code></pre>

                <h3>Section identifiers</h3>

                <p>Links get a <code>data-section</code> attribute whose value is the text of the nearest preceding heading element. Heading elements are HTML headings <code>H1</code> to <code>H6</code> and elements with a class of <code>ds_accordion__button</code>.</p>

                <p>If a link has a preceding element that has a class of either <code>ds_page-header</code> or <code>ds_layout__header</code>, the tracking script will look for a heading element inside that element.</p>

                <p>Links inside <code>nav</code>&nbsp;elements and elements with a class of <code>ds_metadata</code> are not processed.</p>

                <pre>
                <code class="language-html">&lt;h2&gt;Young Scot cards&lt;/h2&gt;

                &lt;p&gt;If you have a &lt;a href="/young-scot-card" data-section="Young Scot cards"&gt;Young Scot card&lt;/a&gt;, and you live on a Scottish island, you'll be sent 4 free ferry vouchers each year while you're 16, 17 and 18.&lt;/p&gt;</code></pre>

                <h2>Notification banner<a name="notification-banner" id="notification-banner"></a></h2>

                <p>Links in notification banners get a <code>data-banner</code> attribute whose value uses the pattern <code>banner-[bannername]-link</code>. ‘bannername’ is either the ID of the banner or the one-based index of the banner if it does not have an ID.</p>

                <pre>
                <code class="language-html">&lt;a href="#" data-banner="banner-covid-link"&gt;latest COVID guidance&lt;/a&gt;</code></pre>

                <p>Close buttons in notification banners get a <code>data-banner</code> attribute whose value uses the pattern <code>banner-[bannername]-close</code>. ‘bannername’ is either the ID of the banner or the one-based index of the banner if it does not have an ID.</p>

                <pre>
                <code class="language-html">&lt;button class="ds_notification__close  js-close-notification" type="button" data-banner="banner-covid-close"&gt;Close this notification&lt;/button&gt;</code></pre>

                <h2>Pagination<a name="pagination" id="pagination"></a></h2>

                <p>Pagination links get a <code>data-search</code> attribute whose value uses the pattern <code>pagination-[slug of the link text]</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_pagination__link" data-search="pagination-11"&gt;11&lt;/a&gt;

                &lt;a href="#" class="ds_pagination__link" data-search="pagination-prev"&gt;Prev&lt;/a&gt;</code></pre>

                <p>“Load more” links in pagination components get a <code>data-search</code> attribute of <code>pagination-more</code>.</p>

                <pre>
                <code class="language-html">&lt;button class="ds_button" data-search="pagination-more"&gt;Load more&lt;/button&gt;</code></pre>

                <h2>Phase banner<a name="phase-banner" id="phase-banner"></a></h2>

                <p>Links in phase banners get a <code>data-banner</code> attribute whose value uses the pattern <code>banner-[bannername]-link</code>. ‘bannername’ is either the slug of the phase banner’s <code>tag</code> or simply ‘phase’ if the banner does not have a tag.</p>

                <pre>
                <code class="language-html">&lt;a href="mailto:designsystem@gov.scot" data-banner="banner-beta-link"&gt;feedback&lt;/a&gt;</code></pre>

                <h2>Radio buttons<a name="radio-buttons" id="radio-buttons"></a></h2>

                <p>Radio buttons get a <code>data-form</code> attribute whose value uses the pattern <code>radio-[radio group name]-[radio ID]</code>.</p>

                <pre>
                <code class="language-html">&lt;input class="ds_radio__input" id="useful-yes" name="feedback-type" type="radio" value="yes" data-form="radio-feedback-type-useful-yes"&gt;</code></pre>

                <h2>Search results<a name="search-results" id="search-results"></a></h2>

                <p>Links in search results get a <code>data-search</code> attribute whose value uses the pattern <code>search-result-[index]/[total]</code> where the index is one-based. The index takes the current page of results into consideration. For example, if there are 10 results per page and the user is on page 3, index ought to start at 21.</p>

                <p>The start point of the list should be obtained from a <code>start</code> attribute that can be set on the list element.</p>

                <p>The value of ‘total’ is obtained from a <code>data-total</code> attribute on the list element.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_search-result__link" href="#" data-search="search-result-1/68"&gt;Crofting community right to buy&lt;/a&gt;</code></pre>

                <p>If the total not available, that part of the attribute is omitted.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_search-result__link" href="#" data-search="search-result-1"&gt;Crofting community right to buy&lt;/a&gt;</code></pre>

                <h2>Search suggestions<a name="search-suggestions" id="search-suggestions"></a></h2>

                <p>Search suggestions is a block found in the <a href="index_1">Search results</a> pattern.</p>

                <p>Links in search suggestions get a <code>data-search</code> attribute whose value uses the pattern <code>suggestion-result-[index]/[total]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;a aria-label="Did you mean 'crafting'?" href="#" data-search="suggestion-result-1/2"&gt;crafting&lt;/a&gt;</code></pre>

                <h2>Select (dropdown)<a name="select" id="select"></a></h2>

                <p>Select elements get a <code>data-form</code> attribute whose value uses the pattern <code>select-[select ID]</code>.</p>

                <p>Option elements inside selects get a <code>data-form</code> attribute whose value uses the pattern <code>select-[select ID]-[slug of the option's value OR slug of the option's text]</code>.</p>

                <pre>
                <code class="language-html">&lt;select class="ds_select js-has-tracking-event" id="component" data-form="select-component"&gt;
                    &lt;option data-form="select-component-null"&gt;&lt;/option&gt;
                    &lt;option data-form="select-component-accordion"&gt;Accordion&lt;/option&gt;
                    &lt;option data-form="select-component-breadcrumbs"&gt;Breadcrumbs&lt;/option&gt;
                    &lt;option data-form="select-component-button"&gt;Button&lt;/option&gt;
                &lt;/select&gt;</code></pre>

                <p>When a user changes selects an option an event is pushed to the window’s <code>dataLayer</code> with the selected option’s <code>data-form</code> attribute.</p>

                <pre>
                <code class="language-javascript">window.dataLayer.push({ 'event': 'select-component-button' });</code></pre>

                <h2>Sequential navigation<a name="sequential-navigation" id="sequential-navigation"></a></h2>

                <p>The ‘previous page’ link in sequential navigation is given a <code>data-navigation</code> attribute whose value is <code>sequential-previous</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_sequential-nav__button  ds_sequential-nav__button--left" data-navigation="sequential-previous"&gt;
                    &lt;span class="ds_sequential-nav__text" data-label="previous"&gt;
                        Apply for or renew a Blue Badge
                    &lt;/span&gt;
                &lt;/a&gt;</code></pre>

                <p>The ‘next page’ link in sequential navigation is given a <code>data-navigation</code> attribute whose value is <code>sequential-next</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_sequential-nav__button  ds_sequential-nav__button--right" data-navigation="sequential-next"&gt;
                    &lt;span class="ds_sequential-nav__text" data-label="next"&gt;
                        Eligibility: who can have one?
                    &lt;/span&gt;
                &lt;/a&gt;</code></pre>

                <h2>Side navigation<a name="side-navigation" id="side-navigation"></a></h2>

                <p>Links in side navigation get a <code>data-navigation</code> attribute whose value uses the pattern <code>sidenav-[index]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_side-navigation__link" data-navigation="sidenav-1"&gt;Apples&lt;/a&gt;</code></pre>

                <p>When there are nested pages in a side navigation, the subpages’ indexes are appended to the attribute.</p>

                <pre>
                <code class="language-html">&lt;a href="#" class="ds_side-navigation__link" data-navigation="sidenav-1-2"&gt;Red apples&lt;/a&gt;</code></pre>

                <p>On small screens the side navigation has an open/close toggle button. That button gets a <code>data-navigation</code> attribute whose value uses the pattern <code>navigation-[open/close]</code>.This attribute is updated to denote the correct action when the side navigation is opened or closed.</p>

                <pre>
                <code class="language-html">&lt;button class="ds_side-navigation__expand ds_link js-side-navigation-button" data-navigation="navigation-open"&gt;Show all pages in this section&lt;/button&gt;</code></pre>

                <h2>Site branding<a name="site-branding" id="site-branding"></a></h2>

                <p>Site branding is a block found in the <a href="index">Site header</a> pattern.</p>

                <p>The site branding logo link is given a <code>data-header</code> attribute whose value is <code>header-logo</code>.</p>

                <p>The site branding title link is given a <code>data-header</code> attribute whose value is <code>header-title</code>.</p>

                <pre>
                <code class="language-html">&lt;div class="ds_site-branding"&gt;
                    &lt;a class="ds_site-branding__logo  ds_site-branding__link" href="/" data-header="header-logo"&gt;
                        &lt;img class="ds_site-branding__logo-image" src="/assets/images/logos/scottish-government.svg" alt="Scottish Government"&gt;
                    &lt;/a&gt;

                    &lt;div class="ds_site-branding__title" data-header="header-title"&gt;
                        Design System
                    &lt;/div&gt;
                &lt;/div&gt;</code></pre>

                <h2>Site footer<a name="site-footer" id="site-footer"></a></h2>

                <p>Site item links in site footers get a <code>data-footer</code> attribute whose value uses the pattern <code>footer-link-[index]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;a href="/cookies/" data-footer="footer-link-2"&gt;Cookies&lt;/a&gt;</code></pre>

                <p>Copyright and logo links are treated differently.</p>

                <p>Copyright links get a <code>data-footer</code> attribute whose value is <code>footer-copyright</code>.</p>

                <p>Logo links are get a <code>data-footer</code> attribute whose value is <code>footer-logo</code>.</p>

                <h2>Site navigation<a name="site-navigation" id="site-navigation"></a></h2>

                <p>Links in site navigation components get a <code>data-header</code> attribute whose value uses the pattern <code>header-link-[index]</code> where the index is one-based. They are also given a <code>data-device</code> attribute whose value is either <code>mobile</code> or <code>desktop</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="/patterns/" class="ds_site-navigation__link" data-device="desktop" data-header="header-link-4"&gt;Patterns&lt;/a&gt;</code></pre>

                <p>The mobile navigation’s toggle button is given a <code>data-header</code> attribute of <code>header-menu-toggle</code>.</p>

                <h2>Skip links<a name="skip-links" id="skip-links"></a></h2>

                <p>Links in skip links components get a <code>data-navigation</code> attribute whose value uses the pattern <code>skip-link-[index]</code> where the index is one-based.</p>

                <pre>
                <code class="language-html">&lt;div class="ds_skip-links"&gt;
                    &lt;ul class="ds_skip-links__list"&gt;
                        &lt;li class="ds_skip-links__item"&gt;&lt;a class="ds_skip-links__link" href="#main-content" data-navigation="skip-link-1"&gt;Skip to main content&lt;/a&gt;&lt;/li&gt;
                    &lt;/ul&gt;
                &lt;/div&gt;</code></pre>

                <h2>Tabs<a name="tabs" id="tabs"></a></h2>

                <p>Tabs get a <code>data-navigation</code> attribute whose value uses the pattern <code>tab-link-[tabset index]-[tab index]</code> where the indexes are one-based.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_tabs__tab-link" href="#tab2" role="tab" data-navigation="tab-link-1-2"&gt;Choosing apprenticeships&lt;/a&gt;</code></pre>

                <h2>Task list<a name="task-list" id="task-list"></a></h2>

                <p>Links to tasks within task lists get a <code>data-navigation</code> attribute whose value is <code>tasklist</code>.</p>

                <pre>
                <code class="language-html">&lt;a class="ds_task-list__task-link" href="#" data-navigation="tasklist"&gt;Conditions &lt;span class="visually-hidden"&gt;(Completed)&lt;/span&gt;&lt;/a&gt;
                </code></pre>

                <p>The "skip to first incomplete section" link in a task list gets a <code>data-navigation</code> attribute whose value is <code>tasklist-skip</code>.</p>

                <pre>
                <code class="language-html">&lt;a href="#task2" class="js-task-list-skip-link" data-navigation="tasklist-skip"&gt;Skip to first incomplete section&lt;/a&gt;</code></pre>

                <h2>Text input<a name="text-input" id="text-input"></a></h2>

                <div class="ds_warning-text"><strong class="ds_warning-text__icon"></strong> <strong class="visually-hidden">Warning</strong>

                <div class="ds_warning-text__text">
                <p>Content of text inputs would not be routinely tracked through website analytics due to the risk of gathering personally identifiable information.</p>
                </div>
                </div>

                <p>Text inputs get a <code>data-form</code> attribute whose value uses the pattern <code>[input type]input-[input ID]</code>.</p>

                <p>Note the use of the input elements’s type in the pattern. With this, different types of input can be identified.</p>

                <pre>
                <code class="language-html">&lt;input class="ds_input" type="text" id="first-name" data-form="textinput-first-name"&gt;

                &lt;input class="ds_input" type="number" id="age" data-form="numberinput-age"&gt;</code></pre>

                <h2>Textarea<a name="textarea" id="textarea"></a></h2>

                <div class="ds_warning-text"><strong class="ds_warning-text__icon"></strong> <strong class="visually-hidden">Warning</strong>

                <div class="ds_warning-text__text">
                <p>Content of textareas would not be routinely tracked through website analytics due to the risk of gathering personally identifiable information.</p>
                </div>
                </div>

                <p>Textareas get a <code>data-form</code> attribute whose value uses the pattern <code>textarea-[textarea ID]</code>.</p>

                <pre>
                <code class="language-html">&lt;textarea class="ds_input" rows="3" id="description" data-form="textarea-description"&gt;&lt;/textarea&gt;</code></pre>

                <h2>Warning text<a name="warning-text" id="warning-text"></a></h2>

                <p>Links in warning text components get a <code>data-navigation</code> attribute of <code>warning-link</code>.</p>

                <pre>
                <code class="language-html">&lt;div class="ds_warning-text"&gt;
                    &lt;strong class="ds_warning-text__icon" aria-hidden="true"&gt;!&lt;/strong&gt;
                    &lt;strong class="visually-hidden"&gt;Warning&lt;/strong&gt;
                    &lt;div class="ds_warning-text__text"&gt;Stay safe by following the &lt;a data-navigation="warning-link" href="#"&gt;advice of the emergency services&lt;/a&gt; during a flood.&lt;/div&gt;
                &lt;/div&gt;</code></pre>
