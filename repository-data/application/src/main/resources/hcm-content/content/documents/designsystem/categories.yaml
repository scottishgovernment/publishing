              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>When your questions are ready, design your digital form following these principles:</p>

                <h2>Tell users about the form’s requirements at the start</h2>

                <p>The form should have introductory content that tells users what information they will need to provide. This will help them plan enough time to complete the form and let them gather any documents they need before they begin. This content can be at the start of the form, or on the page that links to the form.</p>

                <p>If possible, work with a content designer and include the following information where relevant:</p>

                <ul>
                 <li>a list of documents required to complete the form</li>
                 <li>the average time it takes to complete the form</li>
                 <li>whether the form must be completed in one session or if progress can be saved and returned to over multiple sessions</li>
                 <li>how many steps need to be taken to complete the form</li>
                </ul>

                <h2>Apply the ‘one thing per page’ concept</h2>

                <p>The ‘one thing per page’ concept is used for designing many of the digital forms in government. This does not strictly mean one question per page, but if there are multiple questions on a page they should be closely related.</p>

                <p>‘One thing per page’ reduces cognitive load by removing unrelated form questions on a page. This helps users focus on the questions they need to complete.</p>

                <div class="ds_inset-text">
                <div class="ds_inset-text__text">
                <p>Live example:&nbsp;<a href="https://www.mygov.scot/browse/benefits/adult-disability-payment/adult-disability-payment-suitability-checker">Check if you qualify for Adult Disability Payment (mygov.scot)</a></p>
                </div>
                </div>

                <h2>Group related questions</h2>

                <p>Grouping related questions into sections or steps can help users understand the form quicker. This reduces form completion time, stress and cognitive load. If your form has more than six questions, it’s good practice to group these pages into logical sections or steps.</p>

                <h2>Think about the order of the questions</h2>

                <p>It’s important to present your questions in the order that is most logical for users to follow. This avoids confusion and frustration.</p>

                <p>For example, a scholarship form for students from a specific set of countries should begin with a question asking for their nationality. This immediately lets applicants know if they qualify, and if they should continue completing the form based on their response. This avoids wasted effort for those who don’t qualify.</p>

                <h2>Use appropriate form fields</h2>

                <p>Choosing the most appropriate type of form field for the user’s response to a question will help:</p>

                <ul>
                 <li>avoid unnecessary mistakes</li>
                 <li>reduce cognitive load</li>
                 <li>lower the time taken to complete the form</li>
                </ul>

                <p>The following examples show selection of a form field based on the type of question asked:</p>

                <ul>
                 <li>use&nbsp;<a href="index_1">radio buttons</a>&nbsp;when there is a limited choice of options and only one can be selected</li>
                 <li>use&nbsp;<a href="index">checkboxes</a>&nbsp;when there is a limited choice of options and more than one can be selected</li>
                 <li>use&nbsp;<a href="index_2">text input</a>&nbsp;fields when asking for short pieces of information and&nbsp;<a href="index_3">textareas</a>&nbsp;where a longer response is needed</li>
                </ul>

                <p>If possible, structure your questions to use radio buttons or checkboxes rather than a dropdown select to reduce cognitive load.</p>

                <p>For text fields, you should also consider the type of data the user is being asked to provide. For example:</p>

                <ul>
                 <li>a&nbsp;<a href="index_4">date picker</a>&nbsp;may be the most suitable for browsing for a date in a calendar, while specific input fields for day, month and year may be more suitable for known dates such as date of birth</li>
                 <li>the size of the field should be appropriate for the expected input, such as a postcode or telephone number</li>
                 <li>if fields have a maximum acceptable length, show a&nbsp;<a href="index_5">character count</a>&nbsp;so the user knows how much space they have remaining</li>
                </ul>

                <h2>Help users avoid errors</h2>

                <p>Provide clear instructions that help users fill out forms correctly on their first attempt. This will help prevent errors.</p>

                <p>Hint text can be added to form questions to guide correct user input. For example, provide a suitability checklist for a password field to help users create a password that will be accepted.</p>

                <h2>Form validation and error handling</h2>

                <p>When errors do happen, these should be reported back to the user as clear and specific instructions to help them correct the issues. Show an&nbsp;<a href="index_6">error summary</a>&nbsp;listing all of the errors at the top of the form, and individual&nbsp;<a href="index_7">error messages</a>&nbsp;on each form field that needs to be corrected.</p>

                <h2>Optional and required questions</h2>

                <p>User research shows that when optional fields are marked as ‘optional’, users often ignore them. It’s better to use more descriptive text such as ‘if you know it’.</p>

                <p>Most of your questions should be required fields. In this situation you should add a text label to mark the optional questions.</p>

                <p>In certain cases most questions may be optional. In this situation mark the required fields with ‘required’ text labels instead.</p>

                <p>Don’t identify required fields with asterisks. This can cause problems for screen reader users. You would also have to explain what the asterisks mean.</p>

                <h2>Structuring long forms</h2>

                <p>When forms are long or complex with multiple steps, give a way for users to follow their progress and understand what they still need to complete. The <a href="index_8">‘task list’ pattern</a>&nbsp;can be used to show how a long form is structured and its state of completion.</p>

                <h2>Design for mobile first</h2>

                <p>‘Mobile first’ is a design strategy where you begin with the smallest and least capable devices first and work your way up to larger screens. Working in this way helps you to prioritise the most important content for your users. It creates a strong foundation for you to add to on larger screens and helps you to avoid superfluous elements on your page. Mobile first prioritises content over decoration.</p>

                <p>Use features available on mobile phones to help people to use your service, but remember that these features won’t necessarily be available to everybody depending on the capabilities of their device. For example, you could allow people to take a photograph of a document they need to provide to you, but you will also need to provide an alternative way to provide that document such as a file upload.</p>

                <p>Over half of all Internet traffic is on a mobile device, and on some Scottish Government services mobile usage is over 87% of all traffic. Most people have a mobile phone, and for some people their phone is the only way they access the Internet at home.</p>

                <h2>Set clear expectations when the form is submitted</h2>

                <p>When the form is submitted, clearly tell users about what to expect in the next steps in the process. If the process is complete, the form should tell the user about the outcome.</p>
