          publishing:metaDescription: The Design System adds data attributes to components
            to help with analytics tracking.
          publishing:noindex: false
          publishing:publicationDate: 0001-01-01T12:00:00Z
          publishing:reportingtags: []
          publishing:sensitive: false
          publishing:seoTitle: Tracking
          publishing:serviceproviders: []
          publishing:showFeedback: true
          publishing:showInParent: true
          publishing:summary: The Design System adds data attributes to components
            to help with analytics tracking.
          publishing:title: Tracking
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>The Design System has a script that adds ‘data attributes’ to components. Analytics software can use these data attributes to track user behaviour and measure performance. The script adds data attributes automatically, but developers still have some control over them.</p>

                <p>Calling the function <code>tracking.init()</code> adds data attributes to all Design System components.</p>

                <p>The script logic picks:</p>

                <ul>
                 <li>the attribute name from a set of broad categories</li>
                 <li>the attribute value, derived from the context the component is used in</li>
                </ul>

                <p>For example, this is some markup for a simple Design System button:</p>

                <pre>
                <code class="language-html">&lt;button class="ds_button"&gt;
                    Start here
                &lt;/button&gt;</code></pre>

                <p>The script gives that button a data-button attribute with a value that uses the button’s text:</p>

                <pre>
                <code class="language-html">&lt;button class="ds_button" data-button="button-start-here"&gt;
                    Start here
                &lt;/button&gt;</code></pre>

                <p>The simplest use of the script is to call <code>tracking.init()</code> after the DOM is loaded. In some cases, you might want to have more control over:</p>

                <ul>
                 <li>the values used</li>
                 <li>what gets data attributes added</li>
                </ul>

                <h2>Custom data attribute values</h2>

                <p>The developer can set the data attribute manually in the component’s markup. The script will only add a data attribute if one is not already there.</p>

                <p>For example, if you had a button with a very long text, you might want to shorten that attribute value. If you specify the <code>data-button</code> attribute in your markup before calling <code>tracking.init()</code>, the script will not change that value.</p>

                <pre>
                <code class="language-html">&lt;button class="ds_button" data-button="button-start-here"&gt;
                    Really super duper start here
                &lt;/button&gt;</code></pre>

                <h2>Add data attributes to new components added to the page</h2>

                <p>If new components are added to the DOM after calling <code>tracking.init()</code>, they will not automatically have these data attributes. In most cases, it will be safe to call <code>tracking.init()</code> again. But, it is also possible to restrict the addition of data attributes to a particular DOM node by using an optional ‘scope’ parameter.</p>

                <pre>
                <code class="language-javascript">const myContainer = document.getElementById('my-container');

                // ... add elements to myContainer

                tracking.init(myContainer);</code></pre>

                <h2>Add data attributes to specific component types</h2>

                <p>You can add data attributes to specific component types instead of adding them to everything.</p>

                <p>In general this is less useful than restricting the addition of data attributes to a particular DOM node, but it is available if you need it.</p>

                <pre>
                <code class="language-javascript">tracking.add.accordions()</code></pre>

                <p>This also supports the use of a ‘scope’ parameter. Without a scope parameter, the script will apply to the whole page (the document element).</p>

                <pre>
                <code class="language-javascript">tracking.add.accordions(document.getElementById('my-container'));</code></pre>
