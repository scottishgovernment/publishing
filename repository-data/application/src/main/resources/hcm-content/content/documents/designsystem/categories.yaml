          publishing:reportingtags: []
          publishing:sensitive: false
          publishing:seoTitle: Google Analytics
          publishing:serviceproviders: []
          publishing:showFeedback: true
          publishing:showInParent: true
          publishing:summary: ''
          publishing:title: Universal Analytics (Depracated)
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>This page refers to the old version of Google Analytics - Universal Analytics. Users should refer to <a href="https://designsystem.gov.scot/guidance/analytics/google-analytics">Google Analytics GA4 </a>instead.</p>

                <p><a href="https://support.google.com/analytics/answer/1008080?hl=en">Google Analytics</a>&nbsp;offers both free and enterprise analytics tools to measure website and app data.</p>

                <ul>
                 <li><a href="https://analytics.google.com/analytics/web/">Sign up using your team’s Google account</a></li>
                 <li>Create your account and name it appropriately</li>
                 <li><a href="http://www.seerinteractive.com/blog/get-the-most-out-of-google-analytics-user-permissions/">Grant access to colleagues and any developers who will be working on the service</a></li>
                 <li>Within the Admin settings, you should turn off all data sharing other than within Google products and services</li>
                 <li>Set up Google Analytics Profiles. Profiles are technically new properties, but they are created from within the same account. To do this, you visit the admin page of your desired account. Select the ‘create new property’ option from the property dropdown and enter the desired profile name. The following profiles are recommended:
                 <ul>
                  <li>Raw Data &gt; This is your unfiltered backup dataset - not to be deleted or changed</li>
                  <li>Live &gt; Your main reporting profile</li>
                  <li>Test &gt; This is a duplicate of the Live view and allows you to make changes for testing purposes</li>
                 </ul>
                 </li>
                 <li>Within your live and test profiles create the following&nbsp;<a href="https://support.google.com/analytics/answer/2649553?hl=en&amp;ref_topic=6014102">Views</a>:
                 <ul>
                  <li>Unfiltered Master &gt; with no filtering</li>
                  <li>All traffic &gt; Minimal filtering</li>
                  <li>External - All Devices &gt; This view has internal traffic filtered out</li>
                  <li>Internal - All Devices &gt; This view is the converse of above</li>
                 </ul>
                 </li>
                 <li>Create the required filters for each custom view -&nbsp;<a href="https://www.lovesdata.com/blog/google-analytics-filters">here are a few recommended filters to apply from Loves Data</a></li>
                 <li>Create&nbsp;<a href="https://www.searchenginejournal.com/google-analytics-indepth-look-url-destination-goals/73605/">goals</a>&nbsp;within Google Analytics that are in line with your business KPIs and objectives</li>
                 <li>For key metrics you wish to record but where goals are not applicable you should&nbsp;<a href="https://www.optimizesmart.com/event-tracking-in-google-tag-manager-v2-complete-guide/">set up event tracking</a></li>
                 <li><strong>It’s vital to protect user’s privacy</strong>&nbsp;- along with not collecting sensitive information to your analytics package. To do this we recommend turning off demographic and interests reporting (at property level) and anonymising IP addresses (in Google Analytics you do this by using the anonymizeIp function - this is handled within Google Tag Manager, but it affects Google Analytics data.&nbsp;<a href="https://drive.google.com/open?id=0B3iRPBzyhQkiejNRaTc2eF9kaG8">See this screenshot for configuration within Google Tag Manager</a>)</li>
                 <li>At a property level, turn on the&nbsp;<a href="https://drive.google.com/open?id=0B3iRPBzyhQkiQnlEZGlacE1DNVE">enhanced link attribution</a></li>
                 <li>Set your&nbsp;<a href="https://drive.google.com/open?id=0B3iRPBzyhQkicVZrUC16MmRmQ1k">sessions and campaigns to expire</a>&nbsp;after set durations. We recommend setting sessions to expire after 30 minutes and campaigns after 6 months</li>
                 <li>At a property level set your own domain in the&nbsp;<a href="https://drive.google.com/open?id=0B3iRPBzyhQkiZDNrRnVjb3IzTHc">referral exclusion list</a></li>
                 <li>Deploy the property configurations to each of the relevant sites</li>
                </ul>

                <h2>Google Analytics Data Retention</h2>

                <p>Google Analytics provides users with the option to put in place a ‘Data Retention Period’ - this is where Google Analytics keep data available to a user for a period of time. After this period has come to an end, the data will get deleted. Google sets the default for any website at 26 months, but this can be amended to meet the appropriate needs of your organisation. To do this, see the below article from Google.</p>

                <ul>
                 <li><a href="https://support.google.com/analytics/answer/7667196?hl=en">https://support.google.com/analytics/answer/7667196?hl=en</a></li>
                </ul>

                <h2>Updating existing Google Analytics libraries</h2>

                <p>You can use&nbsp;<a href="https://get.google.com/tagassistant/">Google Tag Assistant Chrome extension</a>&nbsp;to identify whether your site is running legacy Google Analytics code libraries. If your site is running legacy old Google Analytics code snippets we recommend updating using this guide.</p>

                <h2>Google Analytics - additional reading</h2>

                <ul>
                 <li><a href="https://builtvisible.com/google-analytics-resource-guide/">Builtvisible: Google Analytics: a guide for beginners</a></li>
                 <li><a href="https://www.annielytics.com/blog/">Annielytics blog</a></li>
                 <li><a href="https://developers.google.com/analytics/devguides/platform/">Google: Learn about Google Analytics</a></li>
                 <li><a href="https://www.kaushik.net/avinash/tricks-to-up-level-your-analytics-reports/">Avinasg Kaushik: Simple tricks to up-level your analytics reports</a></li>
                 <li><a href="https://ga-dev-tools.appspot.com/">GA Dev Tools: Discover the Google Analytics platform</a></li>
                 <li><a href="https://support.google.com/analytics/answer/1009618">Google: Hierarchy of organizations, accounts, users, properties, and views</a></li>
                 <li><a href="https://support.google.com/analytics/answer/2649553?hl=en&amp;ref_topic=6014102">Google: About views</a></li>
                 <li><a href="https://www.searchenginejournal.com/google-analytics-indepth-look-url-destination-goals/73605/">Search Engine Journal: Google Analytics Indepth Look: URL Destination Goals</a></li>
                </ul>
