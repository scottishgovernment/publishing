              jcr:primaryType: hippogallerypicker:imagelink
              hippo:docbase: ed46afe7-b6d1-4216-97ef-82f47be45348
              hippo:facets: []
              hippo:modes: []
              hippo:values: []
          /publishing:contentblocks[15]:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <h2>Data visualisation and accessibility</h2>

                <p>It is important that the data visualisations produced by the Scottish Government can be understood by as many as people as possible, including those who perceive colours differently.</p>

                <p>Poor colour use can cause problems such as:</p>

                <ul>
                 <li>
                 <p>people who are colour blind may not be able to understand a chart that uses different colours for different parts of the chart</p>
                 </li>
                 <li>
                 <p>people who have low vision may not be able to read text that's a light colour on a white background</p>
                 </li>
                 <li>
                 <p>people using a mobile phone when it's sunny may not be able to see low contrast text or tell the difference between colours.</p>
                 </li>
                </ul>

                <h2>Development</h2>

                <p>The data visualisation palettes are based on the principles defined by the <a href="https://analysisfunction.civilservice.gov.uk/">Government Analysis Function</a>. Their website contains in depth guidance and training materials on many aspects of data visualisation.</p>

                <p>We used the <a href="https://projects.susielu.com/viz-palette?colors=[%22#002d54%22,%22#2b9c93%22,%22#6a2063%22,%22#e5682a%22,%22#0b4c0b%22,%22#5d9f3c%22,%22#592c20%22,%22#ca72a2%22]&amp;backgroundColor=%22white%22&amp;fontColor=%22black%22&amp;mode=%22normal%22">Viz Palette tool</a> to test palette combinations against different types of colour blindness. We also sought advice and input from accessibility and data experts within our organisation.</p>
          /publishing:UpdateHistory:
