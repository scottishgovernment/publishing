              hippostd:content: |-
                <p>To get the best out of your web analytics setup, it’s recommended that those who will frequently use the tools go on training. This is key to getting the best out of a platform, gaining insight into the performance of your service and understanding how your customers/users interact with the service. This training is also necessary for driving change in a data driven, evidence based manner.</p>

                <p>Google offer free training on their analytics and tag management tools. This can be accessed on their&nbsp;<a href="https://analytics.google.com/analytics/academy/">Analytics Academy website</a>.</p>

                <p>Contact the&nbsp;<a href="mailto:performance@gov.scot">Scottish Government Performance Team</a>&nbsp;if you have any questions about training.</p>

                <h2>Support</h2>

                <p>If your organisation needs more advanced support or configuration, or if you’d like to know more about how to make changes based on the data you’re getting from your analytics tools, please contact the&nbsp;<a href="mailto:performance@gov.scot">Scottish Government Performance Team</a>. You may also want to get involved in the&nbsp;<a href="https://www.gov.uk/service-manual/communities/performance-and-data-analysis-community">UK Government performance community</a>.</p>
