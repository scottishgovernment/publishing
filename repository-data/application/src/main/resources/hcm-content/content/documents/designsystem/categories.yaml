            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>When creating an effective form, spacing is important. Placing form labels near the associated text field and grouping related fields helps users to complete forms quicker and with less confusion.</p>

                <p>The following examples show how the layout of form elements can help users.</p>

                <h2>Label and field spacing</h2>

                <p>Make sure that each label and its field are clearly associated with each other and separated from surrounding labels and fields. Equal spacing makes it unclear which label relates to which field. This may cause incorrect user inputs.</p>

                <p>This can be avoided by the proper use of spacing so that the user can quickly identify which label relates to which field.</p>
          /publishing:contentblocks[2]:
            jcr:primaryType: publishing:dsfigureblock
            publishing:alt: A form with equal spacing between field labels, text inputs
              and the pairs of labels and inputs that follow them. The equal spacing
              is also demonstrated with an illustrated scale to the side of the form.
            publishing:caption: When there are several inputs equal spacing makes
              it unclear which label relates to which field.
            publishing:overflow: true
            /publishing:image:
