                <p>This palette contains the dark blue and a medium grey. The grey in this palette has good contrast against the dark blue and meets the necessary requirements against white (#ffffff) but not off-white (#f8f8f8). Therefore data visualisations using this palette should only use a white background.</p>

                <p>The focus line should also be slightly thicker than the non-focussed lines in the chart, in this example the focus line is one pixel thicker.&nbsp;We only recommend using this approach when it's essential to communicate your message.</p>

