          publishing:title: Accessibility in forms
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p>It is important to make sure that your forms can be completed by all users. Making a form accessible often results in a better user experience for users without disabilities as well.</p>

                <h2>Associate labels with inputs</h2>

                <p>Labels need to be descriptive and programmatically associated to the input field they describe.</p>

                <p>Do not use placeholder text instead of a label. Placeholder text can often be hard for people with low vision to see due to low contrast. Placeholder text can also be frustrating for people with short term memory issues because it disappears when the field takes focus or when the user starts typing.</p>

                <p>When you are asking one question per page, you should make the question the page heading&nbsp;<code>h1</code>&nbsp;as well as the form&nbsp;<code>label</code>&nbsp;or&nbsp;<code>legend</code>&nbsp;to avoid any duplication of content.</p>

                <p>If you’re asking multiple questions per page, do not use the first question as the page heading.</p>

                <p>For radio buttons and checkboxes, place the label to the right of the form control. This makes it easier to align multiple checkboxes or radio buttons. Stacking groups of radio buttons and checkboxes vertically helps users who use screen magnifiers.</p>

                <p>Further information:&nbsp;<a href="https://www.w3.org/WAI/tutorials/forms/labels/">Labeling Controls (Web Accessibility Initiative)</a></p>

                <h2>Grouping controls</h2>

                <p>Use&nbsp;<code>fieldset</code>&nbsp;elements to group related form controls. The first element inside a fieldset must be a&nbsp;<code>legend</code>&nbsp;element which describes the group.</p>

                <p>The label for radio buttons and checkboxes should be associated with the answer and not the related question. Correct use of fieldset and legend elements will help users of assistive technology to understand the relationship between the question and the possible answers.</p>

                <p>Further information:&nbsp;<a href="https://www.w3.org/WAI/tutorials/forms/grouping/">Grouping Controls (Web Accessibility Initiative)</a></p>

                <h2>Use autocomplete attributes</h2>

                <p>Users can benefit when common input fields are automatically populated with values stored by their browser. In HTML, use the autocomplete attribute to identify the purpose of the field so that the automated input will be correct. This can be particularly beneficial to users with some cognitive disabilities.</p>

                <p>Further information:&nbsp;<a href="https://www.w3.org/TR/WCAG21/#input-purposes">Input Purposes for User Interface Components (WCAG 2.1)</a></p>

                <h2>Error messages</h2>

                <p>Provide clear error messaging to help users understand when there has been an error and how to resolve it.</p>

                <p>Provide a&nbsp;<a href="index_1">summary of validation errors</a>&nbsp;at the top of the page and show&nbsp;<a href="index">individual error messages</a>&nbsp;next to the specific fields that have errors. If possible, include the inline error message as part of the programmatic label so that a screen reader user can hear the error when the field has focus.</p>

                <p>For longer forms, provide links from the summary error list which place focus on the field in error.</p>

                <p>Further information:&nbsp;<a href="https://www.w3.org/WAI/tutorials/forms/validation/">Validating Input (Web Accessibility Initiative)</a></p>
