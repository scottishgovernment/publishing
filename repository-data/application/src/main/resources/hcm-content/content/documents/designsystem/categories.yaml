          publishing:seoTitle: Bing Webmaster Tools
          publishing:serviceproviders: []
          publishing:showFeedback: true
          publishing:showInParent: true
          publishing:summary: ''
          publishing:title: Bing Webmaster Tools
          publishing:userneed: ''
          /publishing:contentOwner:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /publishing:deprecatednote:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /publishing:contentblocks:
            jcr:primaryType: publishing:dscontentblock
            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <p><a href="https://www.bing.com/toolbox/webmaster">Bing Webmaster Tools</a>&nbsp;is a service for website administrators to check indexing status, optimise visibility of their websites, view a sample of websites that link back to you, and see site errors and Bing crawl stats.</p>

                <ul>
                 <li><a href="https://www.bing.com/toolbox/webmaster">Sign in to Bing Webmaster Tools using a shared email account</a></li>
                 <li>Add your domain. Note: it’s often best to start with the root domain (without the www.) e.g.&nbsp;<code>https://twitter.com</code></li>
                 <li>Submit a link to your XML sitemap - this is normally found at&nbsp;<code>yoursite.com/sitemap.xml</code></li>
                 <li>You’ll be presented with 3 verification options. Our recommended method is to use the ‘add CNAME record to DNS’ option. You’ll be presented with a string of characters used by Bing for confirmation that you are the owner/admin of the site in question. Follow the instructions to create a text record in the zone file, or have your DNS provider do this for you if you have a managed service.</li>
                 <li>Once applied, you may have to wait a short period of time for the change to fully propagate due to caching and TTL (‘time to live’) before clicking the ‘Verify’ button.</li>
                 <li>Bing sees http and https versions of your site separately, as with www. and non-www. versions - repeat for all combinations of your site</li>
                 <li>There is no way via Bing to set your preferred version of your site - instead you must set up your www. to redirect to non-www. on your server and via your sitemaps and canonicalisation. It’s important that you choose a consistent approach for displaying your domain within search engines and make sure it’s mirrored in your site configuration through canonicalisation and also ensuring that your site is configured to display/redirect to the default version, no matter what version a user types/clicks. Further reading:&nbsp;<a href="https://moz.com/learn/seo/canonicalization">canonicalisation</a>&nbsp;and&nbsp;<a href="https://moz.com/blog/url-rewrites-and-301-redirects-how-does-it-all-work">redirection/rewrites</a>.</li>
                </ul>
