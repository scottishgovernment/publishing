            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: |-
                <h2>Setup</h2>

                <p><a href="https://analytics.google.com/analytics/web/" title="https://analytics.google.com/analytics/web/">Google Analytics</a>&nbsp;offers both free and enterprise analytics tools to measure website and app data. The most recent offering is Google Analytics 4 (GA4) which has <a href="https://www.kristaseiden.com/the-ultimate-guide-for-setting-up-a-google-analytics-4-property/" title="https://www.kristaseiden.com/the-ultimate-guide-for-setting-up-a-google-analytics-4-property/">different setup steps</a> to the older analytics package, Universal Analytics.</p>

                <p>These steps assume that you use Google Tag Manager and the Design System tracking script to deliver analytics on your site.</p>

                <ul>
                 <li>
                 <p><a href="https://analytics.google.com/analytics/web/" title="https://analytics.google.com/analytics/web/">Sign up using your team's Google account</a></p>
                 </li>
                 <li>
                 <p>Create your account and name it appropriately</p>
                 </li>
                 <li>
                 <p>Create your Property</p>
                 </li>
                 <li>
                 <p>Do not turn on Google Signals</p>
                 </li>
                 <li>
                 <p>Turn off <a href="https://support.google.com/analytics/answer/9626162?hl=en" title="https://support.google.com/analytics/answer/9626162?hl=en">ad personalisation</a></p>
                 </li>
                 <li>
                 <p>Switch <a href="https://support.google.com/analytics/answer/10976610?hl=en" title="https://support.google.com/analytics/answer/10976610?hl=en">Reporting Identity</a> to Device-Based</p>
                 </li>
                 <li>
                 <p>Change the <a href="https://support.google.com/analytics/answer/7667196" title="https://support.google.com/analytics/answer/7667196">data retention to 14 months</a></p>
                 </li>
                 <li>
                 <p>Set up GA4 to <a href="https://support.google.com/analytics/answer/10071811" title="https://support.google.com/analytics/answer/10071811">only run on one domain</a></p>
                 </li>
                 <li>
                 <p>Turn on automated link tracking within <a href="https://support.google.com/analytics/answer/9216061" title="https://support.google.com/analytics/answer/9216061">enhanced event measurement</a></p>
                 </li>
                 <li>
                 <p>Turn off automated site search tracking (instead we do this as we transform site searches to lowercase using Google Tag Manager)</p>
                 </li>
                 <li>
                 <p><a href="https://www.analyticsmania.com/post/a-guide-to-custom-dimensions-in-google-analytics-4/" title="https://www.analyticsmania.com/post/a-guide-to-custom-dimensions-in-google-analytics-4/">Add your custom dimensions into the GA4 interface so that they can be used in reporting (and Looker Studio)</a></p>
                 </li>
                 <li>
                 <p>Copy your GA4 measurement ID and add it to the Google Tag Manager variables file along with the site’s domain name</p>
                 </li>
                 <li>
                 <p>Set up <a href="https://support.google.com/analytics/answer/10737381?hl=en" title="https://support.google.com/analytics/answer/10737381?hl=en">Google Search Console integration</a></p>
                 </li>
                </ul>

                <p>As with any site, after doing all of this you’ll still need to sort out your reporting dashboards, cookies controls, privacy statements, manage your access to your accounts, etc.</p>

                <h2>Additional reading</h2>

                <ul>
                 <li>A&nbsp;<a href="https://www.lovesdata.com/blog/google-analytics-checklist" title="https://www.lovesdata.com/blog/google-analytics-checklist">Google Analytics 4 setup checklist</a></li>
                 <li>Some details on&nbsp;<a href="https://www.charlesfarina.com/the-traffic-source-challenge-in-ga4/" title="https://www.charlesfarina.com/the-traffic-source-challenge-in-ga4/">how traffic sources work in Google Analytics 4</a></li>
                 <li>Help with <a href="https://ga-dev-tools.google/ga4/dimensions-metrics-explorer/" title="https://ga-dev-tools.google/ga4/dimensions-metrics-explorer/">metrics and dimensions</a></li>
                </ul>
