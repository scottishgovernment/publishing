            /publishing:content:
              jcr:primaryType: hippostd:html
              hippostd:content: <p>We recommend a maximum of four colours in a chart.
                If you feel you need more than four, think about how you could redesign
                your chart to avoid this. If you must use more than four colours,
                the main-extended palette can be used in the specified order.</p>
          /publishing:contentblocks[8]:
            jcr:primaryType: publishing:dspaletteblock
            publishing:headinglevel: h2
            publishing:title: Sequential data palette
            /publishing:paletteitems[1]:
              jcr:primaryType: publishing:dspaletteitem
